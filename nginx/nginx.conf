worker_processes auto;

events { worker_connections 1024; }

http {
  sendfile on;
  gzip    on;
  gzip_types text/plain application/json application/javascript text/css;

  upstream hub {
    server hub:4000;
  }

  server {
    listen 80;
    server_name trafford.online www.trafford.online;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl http2;
    server_name trafford.online www.trafford.online;

    ssl_certificate     /etc/nginx/ssl/trafford.online.crt;
    ssl_certificate_key /etc/nginx/ssl/trafford.online.key;
    ssl_protocols       TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5:!TLSv1:!TLSv1.1:!TLSv1.2;

    # API proxy
    location /api/ {
      proxy_pass         http://hub;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
      proxy_pass http://hub;
    }

    # Frontend static files (served from GitHub Pages in prod,
    # but also supported locally here)
    location / {
      root  /var/www/html;
      index index.html;
      try_files $uri $uri/ /index.html;
    }
  }
}
