# RT Preempt Linux Kernel Configuration Notes
# Genesis Edge Controller — Layer 1 Molecular Edge
# ============================================================
#
# These are the CRITICAL kernel config options required to achieve
# deterministic latency of < 10 µs on the edge node hardware.
# Apply via `make menuconfig` or merge into your defconfig.
#
# Prebuilt RT patches: https://cdn.kernel.org/pub/linux/kernel/projects/rt/
#

# ── 1. Real-Time Preemption ──────────────────────────────────
CONFIG_PREEMPT_RT=y              # Full PREEMPT_RT patch (CONFIG_PREEMPT=PREEMPT_RT in newer kernels)
# CONFIG_PREEMPT_NONE is not set
# CONFIG_PREEMPT_VOLUNTARY is not set

# ── 2. High-Resolution Timers ────────────────────────────────
CONFIG_HZ_1000=y                 # 1 000 Hz tick rate (1 ms granularity)
CONFIG_HZ=1000
CONFIG_HIGH_RES_TIMERS=y
CONFIG_NO_HZ_FULL=y              # Tick-less for isolated CPUs (reduces interrupt jitter)

# ── 3. CPU Isolation ─────────────────────────────────────────
# Add to kernel boot parameters (grub/extlinux):
#   isolcpus=2,3 nohz_full=2,3 rcu_nocbs=2,3
# This reserves cores 2 & 3 exclusively for the edge controller process.

# ── 4. IRQ Affinity ──────────────────────────────────────────
# Pin hardware IRQs away from isolated cores:
#   /proc/irq/<N>/smp_affinity  → set to 0x3 (cores 0 & 1 only)
# Use the irqbalance service with --banirq on isolated cores.

# ── 5. Memory ────────────────────────────────────────────────
CONFIG_NUMA=n                    # Disable NUMA on single-socket edge boards (reduces overhead)
CONFIG_TRANSPARENT_HUGEPAGE=n   # Disable THP — avoids background compaction jitter
# The edge controller calls mlockall() at startup to pin all pages.

# ── 6. Scheduling ────────────────────────────────────────────
CONFIG_RT_GROUP_SCHED=n          # Disable RT group scheduling — simpler, lower jitter
CONFIG_SCHED_DEBUG=n             # Disable in production to reduce overhead

# ── 7. Power Management ──────────────────────────────────────
# Disable CPU frequency scaling on isolated cores for determinism:
#   cpufreq governor → performance
#   echo performance > /sys/devices/system/cpu/cpu2/cpufreq/scaling_governor
# Disable C-states deeper than C1:
#   intel_idle.max_cstate=1  (Intel)
#   amd_idle.max_cstate=1    (AMD)

# ── 8. Watchdog ──────────────────────────────────────────────
CONFIG_HARDLOCKUP_DETECTOR=y     # Detect runaway RT processes
CONFIG_SOFTLOCKUP_DETECTOR=y

# ── 9. Debugging / Latency Tracing (development only) ────────
# Disable all tracing in production:
# CONFIG_FTRACE is not set
# CONFIG_LATENCYTOP is not set
#
# To measure latency during development, use cyclictest:
#   cyclictest -p80 -t1 -n -i100 --affinity=2

# ── 10. Rust Toolchain Notes ─────────────────────────────────
# The edge controller binary must be compiled with:
#   RUSTFLAGS="-C target-cpu=native -C opt-level=3"
#   cargo build --release --target <your-arm/x86-target-triple>
#
# Confirm PREEMPT_RT is active at runtime:
#   uname -v | grep -i preempt
#   # expected output contains: PREEMPT_RT
